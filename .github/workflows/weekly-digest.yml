name: Weekly Digest

on:
  schedule:
    - cron: '0 21 * * 0' # Monday 6:00 JST
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Create weekly digest issue
        uses: actions/github-script@v7
        with:
          script: |
            const since = new Date();
            since.setDate(since.getDate() - 7);

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              since: since.toISOString(),
              per_page: 100
            });

            const filtered = issues.filter(issue => !issue.pull_request);

            if (filtered.length === 0) {
              core.info('No issues found in the last 7 days.');
              return;
            }

            let body = `# Weekly Digest\n\n`;

            for (const issue of filtered) {
              body += `- #${issue.number} ${issue.title}\n`;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly Digest - ${new Date().toISOString().slice(0, 10)}`,
              body
            });
